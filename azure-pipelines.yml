trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - server/**
      - azure-pipelines.yml
      - docker-compose.yml

pr:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - server/**
      - azure-pipelines.yml

pool:
  vmImage: 'ubuntu-latest'

variables:
  dockerRegistryServiceConnection: 'AzureContainerRegistry'
  imageRepository: 'portal-lomba'
  containerRegistry: '$(REGISTRY_NAME).azurecr.io'
  dockerfilePath: 'server/Dockerfile'
  tag: '$(Build.BuildId)'
  imageName: '$(containerRegistry)/$(imageRepository):$(tag)'
  imageNameLatest: '$(containerRegistry)/$(imageRepository):latest'

stages:
  - stage: Test
    displayName: 'Test Stage'
    jobs:
      - job: UnitTests
        displayName: 'Run Unit Tests'
        steps:
          - checkout: self
          
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Install Node.js'
          
          - script: |
              cd server
              npm install
            displayName: 'Install Dependencies'
          
          - script: |
              cd server
              npm run lint
            displayName: 'Run Linter'
            continueOnError: true
          
          - script: |
              cd server
              npm run test
            displayName: 'Run Tests'
          
          - task: PublishCodeCoverageResults@1
            inputs:
              codeCoverageTool: cobertura
              summaryFileLocation: 'server/coverage/cobertura-coverage.xml'
              reportDirectory: 'server/coverage'
            displayName: 'Publish Coverage Reports'
            condition: always()

  - stage: Build
    displayName: 'Build Stage'
    dependsOn: Test
    condition: succeeded()
    jobs:
      - job: BuildImage
        displayName: 'Build Docker Image'
        steps:
          - checkout: self
          
          - task: Docker@2
            displayName: 'Build Docker Image'
            inputs:
              command: build
              Dockerfile: '$(dockerfilePath)'
              tags: |
                $(imageName)
                $(imageNameLatest)
              arguments: '--build-arg BUILD_NUMBER=$(Build.BuildId)'

  - stage: Push
    displayName: 'Push Stage'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: PushImage
        displayName: 'Push Image to ACR'
        steps:
          - checkout: self
          
          - task: Docker@2
            displayName: 'Build and Push Image'
            inputs:
              command: buildAndPush
              repository: '$(imageRepository)'
              dockerfile: '$(dockerfilePath)'
              containerRegistry: '$(dockerRegistryServiceConnection)'
              tags: |
                $(tag)
                latest

  - stage: Deploy
    displayName: 'Deploy Stage'
    dependsOn: Push
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - deployment: DeployToAzure
        displayName: 'Deploy to Azure Container Instances'
        environment: 'Production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: 'Deploy Web App Container'
                  inputs:
                    azureSubscription: '$(AZURE_SUBSCRIPTION)'
                    appName: '$(AZURE_APP_NAME)'
                    imageName: '$(imageNameLatest)'
                    containers: |
                      $(containerRegistry)/$(imageRepository):latest
