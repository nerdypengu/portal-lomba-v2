trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - server/**
      - azure-pipelines.yml

pool:
  vmImage: 'ubuntu-latest'

variables:
  webAppName: 'portal-lomba-api'

stages:
  - stage: Build
    displayName: 'Test and Build Stage'
    jobs:
      - job: BuildJob
        displayName: 'Test and Zip Code'
        steps:
          - checkout: self
          
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Install Node.js'
            
          - script: |
              cd server
              npm install
            displayName: 'Install Dependencies'

          - script: |
              cd server
              npm audit --audit-level=high
            displayName: 'Security Scan (npm audit)'
            continueOnError: true
            
          - script: |
              cd server
              npm run lint
              npm run test
            displayName: 'Lint and Test'
            continueOnError: true

          - task: DownloadSecureFile@1
            name: gcpCredentials
            displayName: 'Download Google Sheets Credentials'
            inputs:
              secureFile: 'credentials.json'

          - script: |
              cp $(gcpCredentials.secureFilePath) $(System.DefaultWorkingDirectory)/server/credentials.json
            displayName: 'Place credentials.json in server directory'

          - task: ArchiveFiles@2
            displayName: 'Zip Express Backend'
            inputs:
              rootFolderOrFile: '$(System.DefaultWorkingDirectory)/server'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
              replaceExistingArchive: true

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Zip Artifact'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
              ArtifactName: 'drop'

  - stage: Deploy
    displayName: 'Deploy Stage'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployToAzure
        displayName: 'Deploy to Azure App Service'
        environment: 'Production'
        strategy:
          runOnce:
            deploy:
              steps:
                - bash: |
                    echo "Deploying ZIP to Azure via Kudu REST API..."
                    curl -X POST -u "$(PUBLISH_USERNAME):$(PUBLISH_PASSWORD)" \
                    --data-binary @"$(Pipeline.Workspace)/drop/$(Build.BuildId).zip" \
                    "https://$(webAppName).scm.azurewebsites.net/api/zipdeploy"
                  displayName: 'Deploy Code via Publish Profile'