name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'server/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'server/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Scans for hardcoded secrets
      - name: Gitleaks Secret Scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      
      - name: Install dependencies
        working-directory: server
        run: npm install
        
      # 2. Google's Vulnerability Scanner
      - name: Run OSV-Scanner
        working-directory: server
        run: |
          curl -sSL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner -r .
        continue-on-error: true
        
      - name: Lint and Test
        working-directory: server
        run: |
          npm run lint
          npm run test
        continue-on-error: true

      # 3. Create the credentials for Google Sheets
      - name: Create credentials.json
        working-directory: server
        run: |
          cat << 'EOF' > credentials.json
          ${{ secrets.GCP_CREDENTIALS_JSON }}
          EOF

      # 4. ZIP the backend (The reliable method)
      - name: Zip Backend
        working-directory: server
        run: zip -r ${{ github.workspace }}/backend-release.zip . -x "*.git*"

      # 5. Deploy to Azure App Service
      - name: Deploy to Azure App Service
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PUBLISH_USERNAME: ${{ secrets.PUBLISH_USERNAME }}
          PUBLISH_PASSWORD: ${{ secrets.PUBLISH_PASSWORD }}
          AZURE_DEPLOY_URL: ${{ secrets.AZURE_DEPLOY_URL }}
        run: |
          echo "Deploying ZIP to Azure via Kudu REST API..."
          curl -X POST -u "$PUBLISH_USERNAME:$PUBLISH_PASSWORD" \
          --data-binary @"${{ github.workspace }}/backend-release.zip" \
          "$AZURE_DEPLOY_URL"

      # 6. OPTIONAL: Docker Build (Just to keep it in your Packages for the thesis)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: ${{ github.event_name == 'push' }}
          tags: ghcr.io/${{ github.repository_owner }}/portal-lomba-api:latest