name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'server/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'server/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      
      - name: Install dependencies
        working-directory: server
        run: npm install
        
      - name: Security Scan (npm audit)
        working-directory: server
        run: npm audit --audit-level=high
        continue-on-error: true
        
      - name: Lint and Test
        working-directory: server
        run: |
          npm run lint
          npm run test
        continue-on-error: true

      # Safely recreates your Google Sheets credentials file
      - name: Create credentials.json
        working-directory: server
        run: |
          cat << 'EOF' > credentials.json
          ${{ secrets.GCP_CREDENTIALS_JSON }}
          EOF

      - name: Zip Backend
        working-directory: server
        run: zip -r ${{ github.workspace }}/backend-release.zip . -x "*.git*"

      - name: Deploy to Azure App Service
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PUBLISH_USERNAME: ${{ secrets.PUBLISH_USERNAME }}
          PUBLISH_PASSWORD: ${{ secrets.PUBLISH_PASSWORD }}
          AZURE_DEPLOY_URL: ${{ secrets.AZURE_DEPLOY_URL }}
        run: |
          echo "Deploying ZIP to Azure via Kudu REST API..."
          curl -X POST -u "$PUBLISH_USERNAME:$PUBLISH_PASSWORD" \
          --data-binary @"${{ github.workspace }}/backend-release.zip" \
          "$AZURE_DEPLOY_URL"